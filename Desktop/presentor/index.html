<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발표자 뽑기</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">🎯 발표자 뽑기</h1>

    <!-- 이름 입력 영역 -->
    <div class="input-section">
      <label for="names">이름 목록 <span class="hint">(줄바꿈으로 구분)</span></label>
      <textarea id="names" rows="6" placeholder="홍길동&#10;김철수&#10;이영희&#10;박민수&#10;정수진"></textarea>
      <div class="input-actions">
        <button id="save-btn" class="btn btn-secondary">💾 저장</button>
        <button id="load-btn" class="btn btn-secondary">📂 불러오기</button>
        <span id="name-count" class="name-count"></span>
      </div>
    </div>

    <!-- 탭 네비게이션 -->
    <div class="tabs">
      <button class="tab active" data-tab="random">🎰 랜덤 뽑기</button>
      <button class="tab" data-tab="team">👥 팀 나누기</button>
      <button class="tab" data-tab="order">🔢 순서 정하기</button>
    </div>

    <!-- 탭 컨텐츠 -->
    <div class="tab-content">
      <!-- 랜덤 뽑기 -->
      <div id="random-panel" class="panel active">
        <button id="random-btn" class="btn btn-primary btn-large">뽑기!</button>
        <div id="slot-machine" class="slot-machine hidden">
          <div class="slot-window">
            <div id="slot-name" class="slot-name"></div>
          </div>
        </div>
        <div id="random-result" class="result hidden">
          <div class="winner-card">
            <span class="winner-label">당첨!</span>
            <span id="winner-name" class="winner-name"></span>
          </div>
        </div>
      </div>

      <!-- 팀 나누기 -->
      <div id="team-panel" class="panel">
        <div class="team-controls">
          <label for="team-count">팀 수</label>
          <input type="number" id="team-count" min="2" max="20" value="2" />
          <button id="team-btn" class="btn btn-primary">팀 나누기!</button>
        </div>
        <div id="team-result" class="team-result"></div>
      </div>

      <!-- 순서 정하기 -->
      <div id="order-panel" class="panel">
        <button id="order-btn" class="btn btn-primary btn-large">순서 정하기!</button>
        <div id="order-result" class="order-result"></div>
      </div>
    </div>
  </div>

  <!-- Confetti 캔버스 -->
  <canvas id="confetti-canvas"></canvas>

  <script type="module" src="/main.js"></script>
</body>
</html>
